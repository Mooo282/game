<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الروابط 🔗 - Dark Mode</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; color: #fff; text-align: center; padding: 10px; margin: 0; }
        .box { background: #111; max-width: 800px; margin: 20px auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid #333; }
        #player-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; padding: 10px; background: #1a1a1a; border-radius: 15px; border: 1px solid #444; }
        .p-tag { background: #222; padding: 8px 15px; border-radius: 20px; border: 1px solid #555; font-weight: bold; font-size: 0.9em; }
        .p-tag.is-me { border-color: #2563eb; background: #0f172a; }
        h1 { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        #timer { font-size: 3em; color: #ff4d4d; font-weight: 900; }
        #clue-display { font-size: 2em; color: #fb923c; margin: 15px 0; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .card { padding: 15px; border: 2px solid #333; border-radius: 12px; cursor: pointer; font-weight: bold; background: #1a1a1a; color: #ccc; min-height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .card:hover { border-color: #555; background: #222; }
        .card.selected { background: #ca8a04; border-color: #facc15; color: white; transform: translateY(-3px); }
        .card.correct-answer { background: #16a34a !important; color: white !important; border-color: #22c55e !important; }
        input[type="text"] { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; text-align: center; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
        .hidden { display: none !important; }
        #status { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="box">
    <div id="player-bar" class="hidden"></div>
    <div id="name-screen">
        <h1>لعبة الروابط 🔗</h1>
        <input type="text" id="nick" placeholder="اكتب اسمك...">
        <br><br><button onclick="join()">دخول اللعبة</button>
    </div>

    <div id="lobby-screen" class="hidden">
        <h2>بانتظار المضيف...</h2>
        <div id="host-controls" class="hidden">
            <select id="rounds-count" style="background:#222; color:white; padding:5px;"><option value="5">5 جولات</option><option value="10">10 جولات</option></select>
            <br><br><button onclick="startGame()">ابدأ الآن 🚀</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="timer">60</div>
        <div id="status"></div>
        <div id="clue-display"></div>
        <div class="grid" id="grid"></div>
        <div id="controls">
            <div id="draw-ctrl" class="hidden"><input type="text" id="clue-in" placeholder="تلميحك..."><button onclick="sendAction('submitClue')">إرسال (2)</button></div>
            <div id="fake-ctrl" class="hidden"><button onclick="sendAction('submitFake')" style="background:#9333ea;">تضليل (2)</button></div>
            <div id="vote-ctrl" class="hidden"><button onclick="sendAction('submitVote')" style="background:#16a34a;">تصويت (2)</button></div>
        </div>
    </div>
</div>

<script>
    // نظام الحذف التلقائي للهوية (60 ثانية غياب)
    if (localStorage.getItem('last_seen_time') && (Date.now() - parseInt(localStorage.getItem('last_seen_time')) > 60000)) {
        localStorage.clear();
    }
    let myId = localStorage.getItem('game_user_id') || ('u_' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('game_user_id', myId);
    setInterval(() => { localStorage.setItem('last_seen_time', Date.now()); }, 5000);

    const socket = io();
    let isHost = false, selected = [];

    window.onload = () => {
        const savedName = localStorage.getItem('game_user_name');
        if (savedName) {
            socket.emit('joinGame', { userId: myId, name: savedName });
            document.getElementById('name-screen').classList.add('hidden');
            document.getElementById('player-bar').classList.remove('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
        }
    };

    function join() {
        const n = document.getElementById('nick').value; if(!n) return alert("الاسم مطلوب");
        localStorage.setItem('game_user_name', n);
        localStorage.setItem('last_seen_time', Date.now());
        socket.emit('joinGame', { userId: myId, name: n });
        document.getElementById('name-screen').classList.add('hidden');
        document.getElementById('player-bar').classList.remove('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
    }

    function startGame() { socket.emit('requestStart', { rounds: document.getElementById('rounds-count').value }); }

    socket.on('updatePlayerList', d => {
        const bar = document.getElementById('player-bar'); bar.innerHTML = "";
        isHost = (myId === d.hostId);
        if(isHost) document.getElementById('host-controls').classList.remove('hidden');
        d.players.forEach(id => {
            const tag = document.createElement('div');
            tag.className = `p-tag ${id === myId ? 'is-me' : ''}`;
            tag.innerText = d.playerNames[id] + (id === d.hostId ? " 👑" : "");
            bar.appendChild(tag);
        });
    });

    socket.on('timerUpdate', t => { document.getElementById('timer').innerText = t; });

    socket.on('roundStarted', d => {
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('status').innerText = (myId === d.drawerId) ? "دورك الآن!" : `المختار: ${d.drawerName}`;
        document.getElementById('draw-ctrl').className = (myId === d.drawerId) ? "" : "hidden";
        document.getElementById('fake-ctrl').className = "hidden";
        document.getElementById('vote-ctrl').className = "hidden";
        render(d.words, (myId !== d.drawerId));
    });

    socket.on('showClue', d => {
        document.getElementById('clue-display').innerText = `التلميح: ${d.clue}`;
        if(myId !== d.drawerId) document.getElementById('fake-ctrl').classList.remove('hidden');
        render(d.allWords, false);
    });

    socket.on('startVoting', d => {
        document.getElementById('fake-ctrl').classList.add('hidden');
        if(myId !== d.drawerId) document.getElementById('vote-ctrl').classList.remove('hidden');
        render(d.options, false);
    });

    socket.on('roundFinished', d => {
        document.querySelectorAll('.card').forEach(c => {
            if(d.correctWords.includes(c.innerText)) c.classList.add('correct-answer');
        });
    });

    function render(words, disable) {
        const g = document.getElementById('grid'); g.innerHTML = ""; selected = [];
        words.forEach(w => {
            const d = document.createElement('div'); d.className = 'card'; d.innerText = w;
            d.onclick = () => {
                if(disable) return;
                d.classList.toggle('selected');
                selected = [...document.querySelectorAll('.card.selected')].map(e => e.innerText);
                if(selected.length > 2) { d.classList.remove('selected'); selected.pop(); }
            };
            g.appendChild(d);
        });
    }

    function sendAction(ev) {
        if(selected.length !== 2) return alert("اختر كلمتين!");
        const data = ev === 'submitClue' ? { clue: document.getElementById('clue-in').value, words: selected } : selected;
        socket.emit(ev, data);
        document.getElementById(ev === 'submitClue' ? 'draw-ctrl' : (ev === 'submitFake' ? 'fake-ctrl' : 'vote-ctrl')).classList.add('hidden');
    }
</script>
</body>
</html>
