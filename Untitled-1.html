<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الروابط 🔗</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; text-align: center; padding: 10px; margin: 0; }
        .box { background: white; max-width: 700px; margin: 20px auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .card { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: bold; background: #fff; min-height: 85px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .card.selected { background: #fbbf24; border-color: #d97706; }
        .card.correct-answer { background: #22c55e !important; color: white !important; }
        .hidden { display: none !important; }
        button { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        #timer { font-size: 2.2em; color: #ef4444; font-weight: 900; }
        .player-tag { background: #e2e8f0; padding: 5px 10px; border-radius: 20px; margin: 5px; display: inline-flex; align-items: center; }
        #score-board { background: #1e293b; color: white; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: center; flex-wrap: wrap; }
        .score-item { margin: 5px 15px; }
        #leaderboard-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; color: white; }
        .leaderboard-box { background: white; color: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .leader-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .vote-tag { font-size: 0.7em; background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 5px; margin-top: 5px; color: #1e293b; }
    </style>
</head>
<body>

<div class="box">
    <div id="name-screen">
        <h1>لعبة الروابط 🔗</h1>
        <input type="text" id="nick" placeholder="اسمك المستعار...">
        <br><br><button onclick="join()">دخول اللعبة</button>
    </div>

    <div id="lobby-screen" class="hidden">
        <h2 id="wait-msg">جاري الاتصال...</h2>
        <div id="player-list-box" style="background:#f8fafc; padding:15px; border-radius:12px; border:1px solid #cbd5e1; margin-bottom:20px;">
            <strong>المتواجدون:</strong> <div id="online-players"></div>
        </div>
        <div id="host-zone" class="hidden">
            <select id="rounds-count"><option value="5">5 جولات</option><option value="10">10 جولات</option></select>
            <br><br><button onclick="startGame()">ابدأ اللعبة 🚀</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="score-board"><div id="s-list"></div></div>
        <div id="timer">60</div>
        <div id="status">جاري التحميل...</div>
        <div id="clue-display" style="font-size:1.6em; color:#ea580c; font-weight:800; margin:10px 0;"></div>
        <div class="grid" id="grid"></div>
        <div id="draw-ctrl" class="hidden"><input type="text" id="clue-in" placeholder="اكتب الرابط..."><br><button onclick="sendClue()">إرسال الرابط</button></div>
        <div id="fake-ctrl" class="hidden"><button onclick="sendFake()">إرسال التضليل</button></div>
        <div id="vote-ctrl" class="hidden"><button onclick="sendVote()">تأكيد التصويت</button></div>
    </div>
</div>

<div id="leaderboard-overlay" class="hidden">
    <div class="leaderboard-box">
        <span style="font-size:2em; color:#2563eb; display:block; margin-bottom:20px;">🏆 النتائج النهائية</span>
        <div id="final-list"></div>
        <br><button onclick="location.reload()" style="width:100%">لعبة جديدة 🔄</button>
    </div>
</div>

<script>
    const socket = io();
    let selected = [], currentDrawerId = null, myUserId = sessionStorage.getItem('links_id') || 'u_'+Math.random().toString(36).substr(2,9);
    sessionStorage.setItem('links_id', myUserId);

    window.onload = () => {
        const savedName = localStorage.getItem('links_name');
        if (savedName) { document.getElementById('nick').value = savedName; join(); }
    }

    function join() {
        const n = document.getElementById('nick').value;
        if(!n) return alert("اكتب اسمك!");
        localStorage.setItem('links_name', n);
        socket.emit('joinGame', { userId: myUserId, name: n });
        document.getElementById('name-screen').classList.add('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
    }

    socket.on('setRole', d => {
        const isHost = (d.role === 'host');
        document.getElementById('wait-msg').innerText = isHost ? `أهلاً ${d.name}! أنت المضيف.` : `أهلاً ${d.name}! انتظر المضيف.`;
        document.getElementById('host-zone').className = isHost ? "" : "hidden";
    });

    socket.on('updatePlayerList', data => {
        const listDiv = document.getElementById('online-players');
        listDiv.innerHTML = "";
        const isMeHost = (myUserId === data.hostId);
        data.names.forEach(name => {
            const span = document.createElement('span');
            span.className = "player-tag";
            span.innerText = name;
            if (isMeHost && name !== document.getElementById('nick').value) {
                const b = document.createElement('button');
                b.innerText = "❌"; b.style.background = "red"; b.style.color = "white";
                b.onclick = () => { if(confirm(`طرد ${name}؟`)) socket.emit('kickPlayer', name); };
                span.appendChild(b);
            }
            listDiv.appendChild(span);
        });
    });

    socket.on('statusUpdate', msg => {
        const s = document.getElementById('status');
        s.innerText = msg; s.style.background = "#fee2e2";
    });

    socket.on('roundStarted', d => {
        document.getElementById('leaderboard-overlay').classList.add('hidden');
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        updateScores(d.scores, d.playerNames);
        currentDrawerId = d.drawerId;
        const isTurn = (myUserId === d.drawerId);
        selected = [];
        document.getElementById('status').innerText = isTurn ? "دورك! اختر كلمتين واكتب رابطاً" : `انتظر المشفّر يكتب الرابط...`;
        document.getElementById('status').style.background = "#e2e8f0";
        document.getElementById('draw-ctrl').className = isTurn ? "" : "hidden";
        document.getElementById('fake-ctrl').className = "hidden";
        document.getElementById('vote-ctrl').className = "hidden";
        document.getElementById('clue-display').innerText = "";
        render(d.words, !isTurn);
    });

    function render(words, disable) {
        const g = document.getElementById('grid'); g.innerHTML = "";
        words.forEach(w => {
            const div = document.createElement('div'); div.className = 'card' + (disable ? ' disabled' : '');
            div.innerText = w;
            div.onclick = () => { if(!disable) { div.classList.toggle('selected'); selected = [...document.querySelectorAll('.selected')].map(e => e.innerText); } };
            g.appendChild(div);
        });
    }

    function updateScores(s, n) {
        const list = document.getElementById('s-list'); list.innerHTML = "";
        for(let id in s) if(n[id]) list.innerHTML += `<span class="score-item">${n[id]}: ${s[id]}</span>`;
    }

    function sendClue() {
        const val = document.getElementById('clue-in').value;
        if(selected.length !== 2 || !val) return alert("اختر 2 واكتب رابطاً!");
        socket.emit('submitClue', { clue: val, words: selected });
        document.getElementById('draw-ctrl').classList.add('hidden');
    }

    socket.on('showClue', d => {
        document.getElementById('clue-display').innerText = `الرابط: ${d.clue}`;
        if(myUserId !== currentDrawerId) {
            document.getElementById('status').innerText = "تضليل! اختر كلمتين.";
            document.getElementById('fake-ctrl').classList.remove('hidden');
            render(d.allWords, false);
        }
    });

    function sendFake() {
        if(selected.length !== 2) return alert("اختر 2!");
        socket.emit('submitFake', selected);
        document.getElementById('fake-ctrl').classList.add('hidden');
        render([], true);
    }

    socket.on('startVoting', d => {
        const isDrawer = (myUserId === d.drawerId);
        document.getElementById('status').innerText = isDrawer ? "اللاعبون يصوتون..." : "صوّت للأصلية!";
        document.getElementById('vote-ctrl').className = isDrawer ? "hidden" : "";
        render(d.options, isDrawer);
    });

    function sendVote() {
        if(selected.length !== 2) return alert("صوّت لكرتين!");
        socket.emit('submitVote', selected);
        document.getElementById('vote-ctrl').classList.add('hidden');
        render([], true);
    }

    socket.on('roundFinished', d => {
        document.getElementById('status').innerText = "انتهت الجولة!";
        render(d.finalOptions, true);
        setTimeout(() => {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const word = card.innerText;
                if(d.correctWords.includes(word)) card.classList.add('correct-answer');
                for(let uId in d.allVotes) if(d.allVotes[uId].includes(word)) {
                    const tag = document.createElement('div'); tag.className = 'vote-tag';
                    tag.innerText = "🚩 " + d.names[uId]; card.appendChild(tag);
                }
            });
        }, 50);
        updateScores(d.scores, d.names);
    });

    socket.on('timerUpdate', t => { document.getElementById('timer').innerText = t; });
    socket.on('kicked', () => { alert("تم طردك!"); location.reload(); });
    socket.on('banned', () => { alert("أنت محظور."); location.href = "about:blank"; });
    socket.on('gameOver', d => {
        document.getElementById('leaderboard-overlay').classList.remove('hidden');
        const list = document.getElementById('final-list'); list.innerHTML = "";
        d.leaderboard.forEach((p, i) => {
            const emoji = i === 0 ? "🥇" : (i === 1 ? "🥈" : (i === 2 ? "🥉" : "👤"));
            list.innerHTML += `<div class="leader-row"><span>${emoji} ${p.name}</span><span>${p.score}</span></div>`;
        });
    });

    function startGame() { socket.emit('requestStart', { rounds: document.getElementById('rounds-count').value }); }
</script>
</body>
</html>
