<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الروابط 🔗</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; text-align: center; padding: 10px; margin: 0; }
        .box { background: white; max-width: 800px; margin: 20px auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
        #player-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; padding: 10px; background: #f8fafc; border-radius: 15px; border: 1px solid #e2e8f0; }
        .p-tag { background: white; padding: 6px 12px; border-radius: 20px; border: 1px solid #cbd5e1; display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 0.9em; }
        .p-tag.is-me { border-color: #2563eb; background: #eff6ff; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .card { padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: bold; background: #fff; min-height: 50px; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .card.selected { background: #fbbf24; border-color: #d97706; }
        .card.correct-answer { background: #22c55e !important; color: white !important; }
        .hidden { display: none !important; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #timer { font-size: 2.5em; color: #ef4444; font-weight: 900; }
    </style>
</head>
<body>

<div class="box">
    <div id="player-bar" class="hidden"></div>
    <div id="name-screen">
        <h1>لعبة الروابط 🔗</h1>
        <input type="text" id="nick" placeholder="اكتب اسمك..." style="padding:12px; border-radius:8px;">
        <br><br><button onclick="join()">دخول اللعبة</button>
    </div>
    <div id="lobby-screen" class="hidden">
        <h2 id="wait-msg">بانتظار المضيف...</h2>
        <div id="host-controls" class="hidden">
            <select id="rounds-count"><option value="5">5 جولات</option><option value="10">10 جولات</option></select>
            <br><br><button onclick="startGame()">ابدأ اللعبة 🚀</button>
        </div>
    </div>
    <div id="game-screen" class="hidden">
        <div id="timer">60</div>
        <div id="status" style="font-weight:bold;"></div>
        <div id="clue-display" style="font-size:1.8em; color:#ea580c;"></div>
        <div class="grid" id="grid"></div>
        <div id="controls">
            <div id="draw-ctrl" class="hidden"><input type="text" id="clue-in" placeholder="تلميح..."><button onclick="sendAction('submitClue')">إرسال (2)</button></div>
            <div id="fake-ctrl" class="hidden"><button onclick="sendAction('submitFake')">تضليل (2)</button></div>
            <div id="vote-ctrl" class="hidden"><button onclick="sendAction('submitVote')">تصويت (2)</button></div>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let myId = localStorage.getItem('game_user_id') || ('u_' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('game_user_id', myId);

    let isHost = false, selected = [];

    // التحقق التلقائي عند فتح الصفحة
    window.onload = () => {
        const savedName = localStorage.getItem('game_user_name');
        if (savedName) {
            socket.emit('joinGame', { userId: myId, name: savedName, isReturning: true });
            document.getElementById('name-screen').classList.add('hidden');
            document.getElementById('player-bar').classList.remove('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
        }
    };

    socket.on('sessionExpired', () => {
        localStorage.removeItem('game_user_id');
        localStorage.removeItem('game_user_name');
        alert("انتهت جلستك السابقة. يرجى إدخال اسم جديد.");
        location.reload();
    });

    function join() {
        const n = document.getElementById('nick').value;
        if(!n) return alert("الاسم مطلوب");
        localStorage.setItem('game_user_name', n);
        socket.emit('joinGame', { userId: myId, name: n, isReturning: false });
        document.getElementById('name-screen').classList.add('hidden');
        document.getElementById('player-bar').classList.remove('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
    }

    function startGame() {
        socket.emit('requestStart', { rounds: document.getElementById('rounds-count').value });
    }

    socket.on('updatePlayerList', d => {
        const bar = document.getElementById('player-bar'); bar.innerHTML = "";
        isHost = (myId === d.hostId);
        if(isHost) document.getElementById('host-controls').classList.remove('hidden');
        d.players.forEach(id => {
            const tag = document.createElement('div');
            tag.className = `p-tag ${id === myId ? 'is-me' : ''}`;
            tag.innerText = d.playerNames[id] + (id === d.hostId ? " (مضيف)" : "");
            bar.appendChild(tag);
        });
    });

    socket.on('timerUpdate', t => { document.getElementById('timer').innerText = t; });

    socket.on('roundStarted', d => {
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('status').innerText = (myId === d.drawerId) ? "دورك!" : `تخمين من تلميح: ${d.drawerName}`;
        document.getElementById('draw-ctrl').className = (myId === d.drawerId) ? "" : "hidden";
        document.getElementById('fake-ctrl').className = "hidden";
        document.getElementById('vote-ctrl').className = "hidden";
        render(d.words, (myId !== d.drawerId));
    });

    socket.on('showClue', d => {
        document.getElementById('clue-display').innerText = `التلميح: ${d.clue}`;
        if(myId !== d.drawerId) document.getElementById('fake-ctrl').classList.remove('hidden');
        render(d.allWords, false);
    });

    socket.on('startVoting', d => {
        document.getElementById('fake-ctrl').classList.add('hidden');
        if(myId !== d.drawerId) document.getElementById('vote-ctrl').classList.remove('hidden');
        render(d.options, false);
    });

    socket.on('roundFinished', d => {
        document.querySelectorAll('.card').forEach(c => {
            if(d.correctWords.includes(c.innerText)) c.classList.add('correct-answer');
        });
    });

    function render(words, disable) {
        const g = document.getElementById('grid'); g.innerHTML = ""; selected = [];
        words.forEach(w => {
            const d = document.createElement('div'); d.className = 'card'; d.innerText = w;
            d.onclick = () => {
                if(disable) return;
                d.classList.toggle('selected');
                selected = [...document.querySelectorAll('.card.selected')].map(e => e.innerText);
                if(selected.length > 2) { d.classList.remove('selected'); selected.pop(); }
            };
            g.appendChild(d);
        });
    }

    function sendAction(ev) {
        if(selected.length !== 2) return alert("اختر كلمتين!");
        const data = ev === 'submitClue' ? { clue: document.getElementById('clue-in').value, words: selected } : selected;
        socket.emit(ev, data);
        document.getElementById(ev === 'submitClue' ? 'draw-ctrl' : (ev === 'submitFake' ? 'fake-ctrl' : 'vote-ctrl')).classList.add('hidden');
    }
</script>
</body>
</html>
