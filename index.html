<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الروابط 🔗</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0a0a0c; --card-bg: #16161e; --primary: #6366f1;
            --accent: #f59e0b; --success: #10b981; --error: #ef4444; --text: #f8fafc;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); background-image: radial-gradient(circle at top right, #1e1e2e, #0a0a0c);
            color: var(--text); text-align: center; padding: 10px; margin: 0; min-height: 100vh;
        }
        .box { 
            background: var(--card-bg); max-width: 700px; margin: 20px auto; 
            padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        #player-bar { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; 
            margin-bottom: 20px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 20px; 
        }
        .p-tag { 
            background: #1e1e26; padding: 6px 12px; border-radius: 12px; 
            border: 1px solid #2d2d3d; display: flex; align-items: center; gap: 8px;
        }
        .p-score { background: var(--primary); color: white; padding: 2px 8px; border-radius: 8px; font-weight: 900; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin: 20px 0; }
        .card { 
            padding: 20px; border: 2px solid #2d2d3d; border-radius: 16px; cursor: pointer; 
            background: #1c1c24; transition: 0.2s; font-weight: bold;
        }
        .selected { background: rgba(245, 158, 11, 0.1) !important; border-color: var(--accent) !important; color: var(--accent); }
        .correct-answer { background: rgba(16, 185, 129, 0.1) !important; border-color: var(--success) !important; box-shadow: 0 0 15px var(--success); }
        .hidden { display: none !important; }
        #timer { font-size: 3em; color: var(--error); font-weight: 900; }
        #clue-display { font-size: 1.8em; color: var(--accent); margin: 15px 0; font-weight: bold; }
        input[type="text"] { padding: 14px; background: #0f0f13; color: #fff; border: 1px solid #333; border-radius: 12px; width: 80%; outline: none; }
        button { background: linear-gradient(135deg, var(--primary), #4f46e5); color: white; border: none; padding: 12px 28px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        #status-msg { margin-top: 15px; color: #aaa; font-style: italic; }
        .vote-info { background: #1e1e26; padding: 12px; border-radius: 12px; margin-top: 8px; text-align: right; border-right: 4px solid var(--primary); font-size: 0.9em; }
        #leaderboard-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

<div class="box">
    <div id="player-bar" class="hidden"></div>
    
    <div id="name-screen">
        <h1 style="background: linear-gradient(to right, #6366f1, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.5em;">الرابط العجيب 🔗</h1>
        <p style="color: #888;">أدخل اسمك لتبدأ التحدي</p><br>
        <input type="text" id="nick" placeholder="اسمك هنا...">
        <br><br><button onclick="join()">دخول اللعبة</button>
    </div>

    <div id="lobby-screen" class="hidden">
        <div id="host-controls" class="hidden">
            <select id="rounds-count" style="background:#222; color:#fff; padding:10px; border-radius:8px; border:1px solid #444;">
                <option value="5">5 جولات</option><option value="10">10 جولات</option>
            </select>
            <br><br><button onclick="startGame()">ابدأ اللعبة 🚀</button>
        </div>
        <p id="wait-msg">بانتظار المضيف لبدء المتعة...</p>
    </div>

    <div id="game-screen" class="hidden">
        <div id="timer">60</div>
        <div id="clue-display"></div>
        <div class="grid" id="grid"></div>
        <div id="controls">
            <div id="draw-ctrl" class="hidden">
                <input type="text" id="clue-in" placeholder="اكتب الرابط السري هنا..."><br><br>
                <button onclick="sendAction('submitClue')">إرسال الرابط</button>
            </div>
            <div id="fake-ctrl" class="hidden"><button onclick="sendAction('submitFake')" style="background:var(--accent);">إرسال التضليل (اختر 2)</button></div>
            <div id="vote-ctrl" class="hidden"><button onclick="sendAction('submitVote')" style="background:var(--success);">تأكيد التصويت</button></div>
        </div>
        <div id="status-msg"></div>
        <div id="vote-details-container"></div>
    </div>
</div>

<div id="leaderboard-overlay" class="hidden">
    <div class="box" style="width:300px; border:2px solid var(--primary);">
        <h2 style="color:var(--accent);">النتائج النهائية 🏆</h2>
        <div id="final-list" style="margin:20px 0; text-align:right;"></div>
        <button onclick="location.reload()">لعب مرة أخرى</button>
    </div>
</div>

<script>
    let myId = localStorage.getItem('game_user_id') || ('u_' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('game_user_id', myId);
    const socket = io();
    let currentDrawerId = null, selected = [], currentGameState = "LOBBY", gameWords = [];

    function join() {
        const n = document.getElementById('nick').value; if(!n) return;
        localStorage.setItem('game_user_name', n);
        socket.emit('joinGame', { userId: myId, name: n });
        document.getElementById('name-screen').classList.add('hidden');
        document.getElementById('player-bar').classList.remove('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
    }

    window.onload = () => { if(localStorage.getItem('game_user_name')) { document.getElementById('nick').value = localStorage.getItem('game_user_name'); join(); } };
    function startGame() { socket.emit('requestStart', { rounds: document.getElementById('rounds-count').value }); }

    socket.on('updatePlayerList', d => {
        currentGameState = d.gameState;
        const bar = document.getElementById('player-bar'); bar.innerHTML = "";
        if(myId === d.hostId && currentGameState === "LOBBY") {
            document.getElementById('host-controls').classList.remove('hidden');
            document.getElementById('wait-msg').classList.add('hidden');
        }
        d.players.forEach(id => {
            const tag = document.createElement('div'); tag.className = 'p-tag';
            tag.innerHTML = `<span>${d.playerNames[id]}${id === d.hostId ? " 👑" : ""}</span><span class="p-score">${d.scores[id]||0}</span>`;
            bar.appendChild(tag);
        });
    });

    socket.on('timerUpdate', t => document.getElementById('timer').innerText = t);

    socket.on('roundStarted', d => {
        currentDrawerId = d.drawerId; selected = []; gameWords = d.words;
        document.getElementById('vote-details-container').innerHTML = "";
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('clue-display').innerText = (myId === d.drawerId) ? "أنت المشفر! اختر كلمتين واكتب الرابط" : `بانتظار ${d.drawerName}...`;
        document.getElementById('draw-ctrl').className = (myId === d.drawerId) ? "" : "hidden";
        render(d.words, (myId !== d.drawerId));
    });

    socket.on('showClue', d => {
        selected = []; gameWords = d.pWords;
        document.getElementById('clue-display').innerHTML = `<small style="font-size:0.5em; color:#888;">المشفر: ${d.drawerName}</small><br>الرابط: ${d.clue}`;
        if(myId !== currentDrawerId) {
            document.getElementById('fake-ctrl').classList.remove('hidden');
            render(d.pWords, false);
        }
    });

    socket.on('startVoting', d => {
        selected = [];
        document.getElementById('fake-ctrl').classList.add('hidden');
        document.getElementById('clue-display').innerText = (myId === d.drawerId) ? "اللاعبون يصوتون..." : "اختر الزوج الصحيح!";
        if(myId !== d.drawerId) document.getElementById('vote-ctrl').classList.remove('hidden');
        
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        d.options.forEach(pair => {
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = pair.join(" + ");
            card.onclick = () => { if(myId === d.drawerId) return; document.querySelectorAll('.card').forEach(c => c.classList.remove('selected')); card.classList.add('selected'); selected = pair; };
            grid.appendChild(card);
        });
    });

    socket.on('roundFinished', d => {
        document.getElementById('vote-ctrl').classList.add('hidden');
        document.querySelectorAll('.card').forEach(c => {
            if(c.innerText === d.correctWords.join(" + ")) c.classList.add('correct-answer');
        });
        let html = '<div style="margin-top:20px;">';
        for (let choice in d.voteDetails) {
            html += `<div class="vote-info"><b>[${choice}]</b>: ${d.voteDetails[choice].join(", ")}</div>`;
        }
        document.getElementById('vote-details-container').innerHTML = html + '</div>';
    });

    socket.on('gameOver', d => {
        document.getElementById('leaderboard-overlay').classList.remove('hidden');
        const list = document.getElementById('final-list'); list.innerHTML = "";
        d.leaderboard.forEach((p, i) => {
            list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;">${i+1}. ${p.name} - ${p.score} نقطة</div>`;
        });
    });

    function render(words, disabled) {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        words.forEach(w => {
            const card = document.createElement('div'); card.className = 'card'; card.innerText = w;
            if(!disabled) {
                card.onclick = () => {
                    if(card.classList.contains('selected')) {
                        card.classList.remove('selected');
                        selected = selected.filter(s => s !== w);
                    } else if(selected.length < 2) {
                        card.classList.add('selected'); selected.push(w);
                    }
                };
            }
            grid.appendChild(card);
        });
    }

    function sendAction(type) {
        if(type === 'submitClue') {
            const clue = document.getElementById('clue-in').value;
            if(selected.length !== 2 || !clue) return alert("اختر كلمتين واكتب الرابط!");
            socket.emit('submitClue', { words: selected, clue });
            document.getElementById('draw-ctrl').classList.add('hidden');
        } else if(type === 'submitFake') {
            if(selected.length !== 2) return alert("اختر كلمتين للتضليل!");
            socket.emit('submitFake', selected);
            document.getElementById('fake-ctrl').classList.add('hidden');
        } else if(type === 'submitVote') {
            if(!selected || selected.length !== 2) return alert("يجب اختيار زوج للتصويت!");
            socket.emit('submitVote', selected);
            document.getElementById('vote-ctrl').classList.add('hidden');
        }
    }
</script>
</body>
</html>
