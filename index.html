<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الروابط 🔗</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; text-align: center; padding: 10px; }
        .box { background: white; max-width: 650px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .card { padding: 18px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: bold; background: #fff; transition: 0.2s; font-size: 1.1em; }
        .card.selected { background: #fbbf24; border-color: #d97706; }
        .card.correct-answer { background: #22c55e !important; color: white !important; border-color: #16a34a !important; box-shadow: 0 0 15px #22c55e; }
        .card.disabled { opacity: 0.7; cursor: not-allowed; pointer-events: none; }
        #status { font-weight: bold; margin: 15px 0; color: #1e293b; font-size: 1.2em; background: #e2e8f0; padding: 12px; border-radius: 10px; min-height: 1.5em; }
        .hidden { display: none; }
        button { background: #2563eb; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #timer { font-size: 2.2em; color: #ef4444; font-weight: 900; }
        #score-board { background: #1e293b; color: white; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: center; flex-wrap: wrap; }
        .score-item { margin: 5px 15px; font-size: 0.9em; }
        input, select { padding: 12px; border-radius: 10px; border: 2px solid #cbd5e1; width: 75%; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="box">
    <div id="name-screen">
        <h1>لعبة الروابط 🔗</h1>
        <input type="text" id="nick" placeholder="اسمك المستعار...">
        <br><br><button onclick="join()">دخول اللعبة</button>
    </div>
    <div id="lobby-screen" class="hidden">
        <h2 id="wait-msg">جاري الاتصال...</h2>
        <div id="player-list-box" style="background:#f8fafc; padding:15px; border-radius:12px; border:1px solid #cbd5e1; margin-bottom:20px;">
            <strong>المتواجدون:</strong> <div id="online-players" style="margin-top:10px; color:#2563eb; font-weight:bold;"></div>
        </div>
        <div id="host-zone" class="hidden">
            <select id="rounds-count"><option value="5">5 جولات</option><option value="10">10 جولات</option></select>
            <br><br><button onclick="startGame()">ابدأ اللعبة 🚀</button>
        </div>
    </div>
    <div id="game-screen" class="hidden">
        <div id="score-board"><div id="s-list"></div></div>
        <div id="timer">60</div>
        <div id="status">جاري التحميل...</div>
        <div id="clue-display" style="font-size:1.8em; color:#ea580c; font-weight:800; margin:10px 0;"></div>
        <div class="grid" id="grid"></div>
        <div id="draw-ctrl" class="hidden"><input type="text" id="clue-in" placeholder="اكتب الرابط..."><br><button onclick="sendClue()">إرسال</button></div>
        <div id="fake-ctrl" class="hidden"><button onclick="sendFake()">إرسال التضليل</button></div>
        <div id="vote-ctrl" class="hidden"><button onclick="sendVote()">تأكيد التصويت</button></div>
    </div>
</div>

<script>
    const socket = io();
    let selected = [], myUserId = sessionStorage.getItem('links_id') || 'u_'+Math.random().toString(36).substr(2,9);
    sessionStorage.setItem('links_id', myUserId);

    function join() {
        const n = document.getElementById('nick').value;
        if(!n) return alert("اكتب اسمك!");
        socket.emit('joinGame', { userId: myUserId, name: n });
        document.getElementById('name-screen').classList.add('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
    }

    socket.on('setRole', d => {
        const isHost = (d.role === 'host');
        document.getElementById('wait-msg').innerText = isHost ? `أهلاً ${d.name}! أنت المضيف الجديد.` : `أهلاً ${d.name}! انتظر المضيف.`;
        document.getElementById('host-zone').className = isHost ? "" : "hidden";
    });

    socket.on('updatePlayerList', names => document.getElementById('online-players').innerText = names.join(" - "));

    socket.on('roundStarted', d => {
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        updateScores(d.scores, d.playerNames);
        const isTurn = myUserId === d.drawerId;
        selected = [];
        document.getElementById('status').innerText = isTurn ? "دورك! اختر كلمتين واكتب رابطاً" : `انتظر ${d.drawerName} يكتب الرابط...`;
        document.getElementById('draw-ctrl').className = isTurn ? "" : "hidden";
        document.getElementById('fake-ctrl').className = "hidden";
        document.getElementById('vote-ctrl').className = "hidden";
        document.getElementById('clue-display').innerText = "";
        render(d.words, !isTurn);
    });

    function render(words, disable) {
        const g = document.getElementById('grid'); g.innerHTML = "";
        words.forEach(w => {
            const div = document.createElement('div'); div.className = 'card' + (disable ? ' disabled' : '');
            div.innerText = w;
            div.onclick = () => { if(!disable) { div.classList.toggle('selected'); selected = [...document.querySelectorAll('.selected')].map(e => e.innerText); } };
            g.appendChild(div);
        });
    }

    function updateScores(s, n) {
        const list = document.getElementById('s-list'); list.innerHTML = "";
        for(let id in s) list.innerHTML += `<span class="score-item">${n[id] || 'لاعب'}: ${s[id]}</span>`;
    }

    function sendClue() {
        const val = document.getElementById('clue-in').value;
        if(selected.length !== 2 || !val) return alert("اختر 2 واكتب رابطاً!");
        socket.emit('submitClue', { clue: val, words: selected });
        document.getElementById('draw-ctrl').classList.add('hidden');
        render([...document.querySelectorAll('.card')].map(c => c.innerText), true);
    }

    socket.on('showClue', d => {
        document.getElementById('clue-display').innerText = `الرابط: ${d.clue}`;
        if(document.getElementById('draw-ctrl').className === "hidden") {
            document.getElementById('status').innerText = "تضليل! اختر كلمتين من الشبكة.";
            document.getElementById('fake-ctrl').classList.remove('hidden');
            render(d.allWords, false);
        }
        selected = [];
    });

    function sendFake() {
        if(selected.length !== 2) return alert("اختر 2!");
        socket.emit('submitFake', selected);
        document.getElementById('fake-ctrl').classList.add('hidden');
        render([], true);
    }

    socket.on('startVoting', d => {
        const isDrawer = (myUserId === d.drawerId);
        document.getElementById('status').innerText = isDrawer ? "أصدقاؤك يصوتون..." : "صوّت الآن للكلمات الأصلية!";
        if(!isDrawer) document.getElementById('vote-ctrl').classList.remove('hidden');
        render(d.options, isDrawer);
        selected = [];
    });

    function sendVote() {
        if(selected.length !== 2) return alert("صوّت لكرتين!");
        socket.emit('submitVote', selected);
        document.getElementById('vote-ctrl').classList.add('hidden');
        render([], true);
    }

    socket.on('roundFinished', d => {
        document.getElementById('status').innerText = "انتهت الجولة! الإجابة بالأخضر.";
        document.querySelectorAll('.card').forEach(card => { if(d.correctWords.includes(card.innerText)) card.classList.add('correct-answer'); });
        updateScores(d.scores, d.names);
    });

    socket.on('timerUpdate', t => { document.getElementById('timer').innerText = t; });
    socket.on('gameOver', () => { alert("انتهت اللعبة!"); location.reload(); });

    function startGame() {
        socket.emit('requestStart', { rounds: document.getElementById('rounds-count').value });
    }
</script>
</body>
</html>
