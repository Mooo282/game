<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الروابط 🔗</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; text-align: center; padding: 10px; margin: 0; }
        .box { background: #111; max-width: 800px; margin: 20px auto; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        #player-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; padding: 15px; background: rgba(26,26,26,0.9); border-radius: 15px; border: 1px solid #444; }
        .p-tag { background: #222; padding: 6px 12px; border-radius: 12px; border: 1px solid #444; display: flex; align-items: center; gap: 8px; }
        .p-score { background: #2563eb; color: white; padding: 2px 8px; border-radius: 8px; font-weight: 900; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
        .card { padding: 20px; border: 2px solid #333; border-radius: 15px; cursor: pointer; background: #1a1a1a; transition: 0.2s; min-height: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; }
        .card span { display: block; font-size: 1.1em; }
        .selected { background: #ca8a04 !important; border-color: #facc15 !important; }
        .correct-answer { background: #16a34a !important; border-color: #22c55e !important; box-shadow: 0 0 15px #16a34a; }
        .hidden { display: none !important; }
        #timer { font-size: 3em; color: #ff4d4d; font-weight: 900; }
        #clue-display { font-size: 2em; color: #fb923c; margin: 15px 0; font-weight: bold; }
        button { background: #2563eb; color: white; border: none; padding: 12px 28px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #status-msg { margin-top: 15px; color: #aaa; font-style: italic; }
        .vote-info { background: #222; padding: 10px; border-radius: 8px; margin-top: 8px; text-align: right; border-right: 4px solid #2563eb; font-size: 0.9em; }
        input[type="text"] { padding:12px; background:#222; color:#fff; border:1px solid #444; border-radius:8px; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <div id="player-bar" class="hidden"></div>
    <div id="name-screen">
        <h1>الرابط العجيب</h1>
        <input type="text" id="nick" placeholder="اكتب اسمك...">
        <br><br><button onclick="join()">دخول</button>
    </div>

    <div id="lobby-screen" class="hidden">
        <div id="host-controls" class="hidden">
            <select id="rounds-count" style="background:#222; color:#fff; padding:8px;"><option value="5">5 جولات</option><option value="10">10 جولات</option></select>
            <br><br><button onclick="startGame()">ابدأ اللعبة 🚀</button>
        </div>
        <p id="wait-msg">بانتظار المضيف...</p>
    </div>

    <div id="game-screen" class="hidden">
        <div id="timer">60</div>
        <div id="clue-display"></div>
        <div class="grid" id="grid"></div>
        <div id="controls">
            <div id="draw-ctrl" class="hidden"><input type="text" id="clue-in" placeholder="اكتب الرابط السري..."><br><br><button onclick="sendAction('submitClue')">إرسال الرابط</button></div>
            <div id="fake-ctrl" class="hidden"><button onclick="sendAction('submitFake')" style="background:#9333ea;">إرسال التضليل (2)</button></div>
            <div id="vote-ctrl" class="hidden"><button onclick="sendAction('submitVote')" style="background:#16a34a;">تأكيد التصويت</button></div>
        </div>
        <div id="status-msg"></div>
        <div id="vote-details-container"></div>
    </div>
</div>

<div id="leaderboard-overlay" class="hidden">
    <div style="background:#111; padding:30px; border-radius:20px; border:2px solid #2563eb; width:280px;">
        <h2>النتائج النهائية 🏆</h2>
        <div id="final-list" style="margin:25px 0;"></div>
        <button onclick="location.reload()">لعبة جديدة</button>
    </div>
</div>

<script>
    let myId = localStorage.getItem('game_user_id') || ('u_' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('game_user_id', myId);
    const socket = io();
    let currentDrawerId = null, selected = [], selectedPair = null, currentGameState = "LOBBY";

    function join() {
        const n = document.getElementById('nick').value; if(!n) return;
        localStorage.setItem('game_user_name', n);
        socket.emit('joinGame', { userId: myId, name: n });
        document.getElementById('name-screen').classList.add('hidden');
        document.getElementById('player-bar').classList.remove('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
    }

    window.onload = () => { if(localStorage.getItem('game_user_name')) { document.getElementById('nick').value = localStorage.getItem('game_user_name'); join(); } };
    function startGame() { socket.emit('requestStart', { rounds: document.getElementById('rounds-count').value }); }

    socket.on('updatePlayerList', d => {
        currentGameState = d.gameState;
        const bar = document.getElementById('player-bar'); bar.innerHTML = "";
        if(myId === d.hostId && currentGameState === "LOBBY") {
            document.getElementById('host-controls').classList.remove('hidden');
            document.getElementById('wait-msg').classList.add('hidden');
        }
        d.players.forEach(id => {
            const tag = document.createElement('div'); tag.className = 'p-tag';
            tag.innerHTML = `<span>${d.playerNames[id]}${id === d.hostId ? " 👑" : ""}</span><span class="p-score">${d.scores[id]||0}</span>`;
            bar.appendChild(tag);
        });
    });

    socket.on('timerUpdate', t => document.getElementById('timer').innerText = t);

    socket.on('roundStarted', d => {
        currentDrawerId = d.drawerId;
        currentGameState = "DRAWING";
        document.getElementById('status-msg').innerText = "";
        document.getElementById('vote-details-container').innerHTML = "";
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('clue-display').innerText = (myId === d.drawerId) ? "أنت المختار! اختر كلمتين واكتب الرابط" : `بانتظار ${d.drawerName} ليكتب الرابط...`;
        document.getElementById('draw-ctrl').className = (myId === d.drawerId) ? "" : "hidden";
        render(d.words, (myId !== d.drawerId), false);
    });

    socket.on('showClue', d => {
        currentGameState = "FAKING";
        document.getElementById('clue-display').innerHTML = `<small style="font-size:0.4em; display:block; color:#aaa;">المشفر: ${d.drawerName}</small>الرابط: ${d.clue}`;
        if(myId !== currentDrawerId) {
            document.getElementById('fake-ctrl').classList.remove('hidden');
            render(d.pWords, false, false);
        } else {
            document.getElementById('status-msg').innerText = "اللاعبون يضعون تضليلهم الآن...";
        }
    });

    socket.on('startVoting', d => {
        currentGameState = "VOTING";
        document.getElementById('fake-ctrl').classList.add('hidden');
        document.getElementById('clue-display').innerText = (myId === d.drawerId) ? "اللاعبون يصوتون الآن..." : "صوّت للزوج الصحيح!";
        if(myId !== d.drawerId) document.getElementById('vote-ctrl').classList.remove('hidden');
        render(d.options, (myId === d.drawerId), true);
    });

    socket.on('roundFinished', d => {
        document.getElementById('status-msg').innerHTML = "<b>انتهت الجولة!</b>";
        document.querySelectorAll('.card').forEach(c => {
            const cardText = [...c.querySelectorAll('span')].map(s => s.innerText).sort().join(" + ");
            if(cardText === d.correctWords.join(" + ")) c.classList.add('correct-answer');
        });
        const detailsContainer = document.getElementById('vote-details-container');
        let html = '<div style="margin-top:20px;">';
        for (let choice in d.voteDetails) {
            html += `<div class="vote-info"><b>[${choice}]</b>: صوّت له (${d.voteDetails[choice].join(", ")})</div>`;
        }
        detailsContainer.innerHTML = html + '</div>';
    });

    socket.on('gameOver', d => {
        document.getElementById('leaderboard-overlay').classList.remove('hidden');
        document.getElementById('final-list').innerHTML = d.leaderboard.map(p => `<div>${p.name}: ${p.score}</div>`).join('');
    });

    function render(data, disable, isVoting) {
        const g = document.getElementById('grid'); g.innerHTML = ""; 
        selected = []; selectedPair = null;
        
        g.style.gridTemplateColumns = isVoting ? "repeat(2, 1fr)" : "repeat(3, 1fr)";

        data.forEach(item => {
            const d = document.createElement('div'); d.className = 'card';
            if (isVoting) {
                d.innerHTML = `<span>${item[0]}</span> <hr style="width:100%; border:0; border-top:1px solid #333; margin:5px 0;"> <span>${item[1]}</span>`;
                d.onclick = () => { if(!disable) { 
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                    d.classList.add('selected'); selectedPair = item; 
                }};
            } else {
                d.innerText = item;
                d.onclick = () => { if(!disable) { 
                    d.classList.toggle('selected');
                    selected = [...document.querySelectorAll('.card.selected')].map(e => e.innerText);
                    if(selected.length > 2) { d.classList.remove('selected'); selected.pop(); }
                }};
            }
            g.appendChild(d);
        });
    }

    function sendAction(ev) {
        let data;
        if (ev === 'submitVote') {
            if(!selectedPair) return alert("اختر زوجاً!");
            data = selectedPair;
        } else {
            if(selected.length !== 2) return alert("اختر كلمتين!");
            if(ev === 'submitClue' && !document.getElementById('clue-in').value.trim()) return alert("اكتب الرابط!");
            data = (ev === 'submitClue') ? { clue: document.getElementById('clue-in').value, words: selected } : selected;
        }
        socket.emit(ev, data);
        document.getElementById('draw-ctrl').classList.add('hidden');
        document.getElementById('fake-ctrl').classList.add('hidden');
        document.getElementById('vote-ctrl').classList.add('hidden');
        document.getElementById('status-msg').innerText = "تم الإرسال.. بانتظار البقية ⌛";
    }
</script>
</body>
</html>
