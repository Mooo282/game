<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة الروابط 🔗</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; text-align: center; padding: 10px; margin: 0; }
        .box { background: #111; max-width: 800px; margin: 20px auto; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        #player-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; background: #1a1a1a; padding: 10px; border-radius: 15px; }
        .p-tag { background: #222; padding: 8px 15px; border-radius: 20px; border: 1px solid #444; font-weight: bold; position: relative; }
        .kick-btn { position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; cursor: pointer; width: 18px; height: 18px; font-size: 10px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .card { padding: 15px; border: 2px solid #333; border-radius: 12px; cursor: pointer; background: #1a1a1a; color: #fff; font-weight: bold; transition: 0.2s; }
        .selected { background: #ca8a04; border-color: #facc15; }
        .correct-answer { background: #16a34a !important; border-color: #22c55e !important; }
        .hidden { display: none !important; }
        #timer { font-size: 3em; color: #ff4d4d; font-weight: 900; }
        #clue-display { font-size: 1.8em; color: #fb923c; margin: 15px 0; min-height: 1.5em; font-weight: bold; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #leaderboard-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div class="box">
    <div id="player-bar" class="hidden"></div>
    
    <div id="name-screen">
        <h1>لعبة الروابط 🔗</h1>
        <input type="text" id="nick" placeholder="اكتب اسمك..." style="padding:10px; background:#222; color:#fff; border:1px solid #444;">
        <br><br><button onclick="join()">دخول</button>
    </div>

    <div id="lobby-screen" class="hidden">
        <h2>بانتظار المضيف...</h2>
        <div id="host-controls" class="hidden">
            <select id="rounds-count" style="background:#222; color:#fff;"><option value="5">5 جولات</option><option value="10">10 جولات</option></select>
            <br><br><button onclick="startGame()">ابدأ 🚀</button>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <div id="timer">60</div>
        <div id="clue-display"></div>
        <div class="grid" id="grid"></div>
        <div id="controls">
            <div id="draw-ctrl" class="hidden"><input type="text" id="clue-in" placeholder="تلميحك..."><button onclick="sendAction('submitClue')">إرسال</button></div>
            <div id="fake-ctrl" class="hidden"><button onclick="sendAction('submitFake')" style="background:#9333ea;">تضليل</button></div>
            <div id="vote-ctrl" class="hidden"><button onclick="sendAction('submitVote')" style="background:#16a34a;">تصويت</button></div>
        </div>
    </div>
</div>

<div id="leaderboard-overlay" class="hidden">
    <div style="background:#111; padding:30px; border-radius:20px; border:1px solid #2563eb; width:280px;">
        <h2>النتائج 🏆</h2>
        <div id="final-list" style="margin:20px 0;"></div>
        <button onclick="location.reload()">لعبة جديدة</button>
    </div>
</div>

<script>
    // نظام الحفظ الذكي: لا نحذف عند الـ Refresh بل عند الغياب الطويل فقط
    let myId = localStorage.getItem('game_user_id');
    let lastSeen = localStorage.getItem('last_seen_time');
    let now = Date.now();

    // إذا غاب أكثر من دقيقة، نحذفه ليبدأ كجديد
    if (lastSeen && (now - parseInt(lastSeen) > 60000)) {
        localStorage.clear();
        myId = null;
    }

    if (!myId) {
        myId = 'u_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('game_user_id', myId);
    }

    // تحديث وقت الوجود كل 5 ثوانٍ
    setInterval(() => { localStorage.setItem('last_seen_time', Date.now()); }, 5000);

    const socket = io();
    let isHost = false, selected = [];

    function join() {
        const n = document.getElementById('nick').value; if(!n) return;
        localStorage.setItem('game_user_name', n);
        socket.emit('joinGame', { userId: myId, name: n });
        document.getElementById('name-screen').classList.add('hidden');
        document.getElementById('player-bar').classList.remove('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
    }

    window.onload = () => {
        const savedName = localStorage.getItem('game_user_name');
        if (savedName) { 
            document.getElementById('nick').value = savedName; 
            join(); // انضمام تلقائي لاستعادة الجلسة
        }
    };

    function startGame() { socket.emit('requestStart', { rounds: document.getElementById('rounds-count').value }); }

    socket.on('updatePlayerList', d => {
        const bar = document.getElementById('player-bar'); bar.innerHTML = "";
        isHost = (myId === d.hostId);
        if(isHost) document.getElementById('host-controls').classList.remove('hidden');
        d.players.forEach(id => {
            const tag = document.createElement('div'); tag.className = `p-tag ${id === myId ? 'is-me' : ''}`;
            tag.innerText = d.playerNames[id] + (id === d.hostId ? " 👑" : "");
            if(isHost && id !== myId) {
                const btn = document.createElement('button'); btn.className = 'kick-btn'; btn.innerText = "×";
                btn.onclick = () => socket.emit('kickPlayer', id);
                tag.appendChild(btn);
            }
            bar.appendChild(tag);
        });
    });

    socket.on('timerUpdate', t => { document.getElementById('timer').innerText = t; });

    socket.on('roundStarted', d => {
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('clue-display').innerText = "";
        document.getElementById('draw-ctrl').className = (myId === d.drawerId) ? "" : "hidden";
        document.getElementById('fake-ctrl').className = "hidden";
        document.getElementById('vote-ctrl').className = "hidden";
        render(d.words, (myId !== d.drawerId));
    });

    socket.on('showClue', d => {
        document.getElementById('clue-display').innerText = `الرابط: ${d.clue}`;
        if(myId !== d.drawerId) document.getElementById('fake-ctrl').classList.remove('hidden');
        render(d.allWords, false);
    });

    socket.on('startVoting', d => {
        document.getElementById('fake-ctrl').classList.add('hidden');
        if(myId !== d.drawerId) document.getElementById('vote-ctrl').classList.remove('hidden');
        render(d.options, false);
    });

    socket.on('roundFinished', d => {
        document.querySelectorAll('.card').forEach(c => { if(d.correctWords.includes(c.innerText)) c.classList.add('correct-answer'); });
    });

    socket.on('gameOver', d => {
        document.getElementById('leaderboard-overlay').classList.remove('hidden');
        document.getElementById('final-list').innerHTML = d.leaderboard.map(p => `<div>${p.name}: ${p.score}</div>`).join('');
    });

    socket.on('youAreKicked', () => { localStorage.clear(); location.reload(); });

    function render(words, disable) {
        const g = document.getElementById('grid'); g.innerHTML = ""; selected = [];
        words.forEach(w => {
            const d = document.createElement('div'); d.className = 'card'; d.innerText = w;
            d.onclick = () => {
                if(disable) return;
                d.classList.toggle('selected');
                selected = [...document.querySelectorAll('.card.selected')].map(e => e.innerText);
                if(selected.length > 2) { d.classList.remove('selected'); selected.pop(); }
            };
            g.appendChild(d);
        });
    }

    function sendAction(ev) {
        if(selected.length !== 2) return alert("اختر كلمتين!");
        if(ev === 'submitClue' && !document.getElementById('clue-in').value.trim()) return alert("يجب كتابة تلميح!");
        socket.emit(ev, ev === 'submitClue' ? { clue: document.getElementById('clue-in').value, words: selected } : selected);
        document.getElementById(ev === 'submitClue' ? 'draw-ctrl' : (ev === 'submitFake' ? 'fake-ctrl' : 'vote-ctrl')).classList.add('hidden');
    }
</script>
</body>
</html>
