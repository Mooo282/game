<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرابط العجيب </title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0a0a0c; --card-bg: #16161e; --primary: #6366f1;
            --accent: #f59e0b; --success: #10b981; --error: #ef4444; --text: #f8fafc;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); 
            background-image: radial-gradient(circle at top right, #1e1e2e, #0a0a0c);
            color: var(--text); margin: 0; padding: 10px; min-height: 100vh;
        }
        .main-wrapper { display: flex; max-width: 1200px; margin: 20px auto; gap: 20px; flex-wrap: wrap; }
        .game-box { flex: 2; min-width: 320px; background: var(--card-bg); padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        
        #player-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 15px; }
        .p-tag { background: #1e1e26; padding: 6px 12px; border-radius: 10px; border: 1px solid #2d2d3d; display: flex; align-items: center; gap: 8px; font-size: 0.9em; }
        .p-score { background: var(--primary); color: white; padding: 1px 7px; border-radius: 6px; font-weight: bold; }

        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin: 20px 0; }
        .card { padding: 18px; border: 2px solid #2d2d3d; border-radius: 14px; cursor: pointer; background: #1c1c24; transition: 0.2s; font-weight: bold; text-align: center; }
        .card:hover { transform: translateY(-3px); background: #23232e; }
        .selected { border-color: var(--accent) !important; color: var(--accent); background: rgba(245,158,11,0.05); }
        .correct-answer { border-color: var(--success) !important; box-shadow: 0 0 15px var(--success); }

        
        #chat-box { flex: 1; min-width: 300px; height: 600px; background: var(--card-bg); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; overflow: hidden; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 10px; font-size: 0.85em; border-right: 3px solid var(--primary); text-align: right; }
        .msg b { display: block; color: var(--primary); font-size: 0.8em; }
        #chat-input-area { padding: 15px; background: rgba(0,0,0,0.2); display: flex; gap: 5px; }

       
        #timer { font-size: 3em; color: var(--error); font-weight: 900; }
        #clue-display { font-size: 1.6em; color: var(--accent); margin: 15px 0; font-weight: bold; }
        input[type="text"], select { padding: 12px; background: #0a0a0c; color: #fff; border: 1px solid #333; border-radius: 10px; outline: none; }
        button { background: linear-gradient(135deg, var(--primary), #4f46e5); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .hidden { display: none !important; }
        #leaderboard-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="game-box">
        <div id="player-bar" class="hidden"></div>

        <div id="name-screen">
            <h1 style="background: linear-gradient(to right, #6366f1, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.8em; margin-bottom: 0.2em;">الرابط العجيب</h1>
            <p style="color: #777;">تحدى أصدقاءك في اكتشاف الروابط الخفية</p><br>
            <input type="text" id="nick" placeholder="اكتب اسمك المستعار..." maxlength="12">
            <br><br><button onclick="join()">ابدأ اللعب</button>
        </div>

        <div id="lobby-screen" class="hidden">
            <div id="host-controls" class="hidden">
                <label>عدد الجولات:</label>
                <select id="rounds-count"><option value="5">5 جولات</option><option value="10">10 جولات</option></select>
                <br><br><button onclick="startGame()">ابدأ الجولة الأولى 🚀</button>
            </div>
            <p id="wait-msg">بانتظار المضيف لبدء اللعبة...</p>
        </div>

        <div id="game-screen" class="hidden">
            <div id="timer">60</div>
            <div id="clue-display"></div>
            <div class="grid" id="grid"></div>
            <div id="controls">
                <div id="draw-ctrl" class="hidden">
                    <input type="text" id="clue-in" placeholder="اكتب الرابط هنا..." style="width:70%"><br><br>
                    <button onclick="sendAction('submitClue')">إرسال الكلمة</button>
                </div>
                <div id="fake-ctrl" class="hidden"><button onclick="sendAction('submitFake')" style="background:var(--accent)">تأكيد التضليل (اختر 2)</button></div>
                <div id="vote-ctrl" class="hidden"><button onclick="sendAction('submitVote')" style="background:var(--success)">تأكيد التصويت</button></div>
            </div>
            <div id="status-msg" style="margin-top:15px; color:#888"></div>
            <div id="vote-details-container"></div>
        </div>
    </div>

    <div id="chat-box" class="hidden">
        <div style="padding:15px; background:rgba(255,255,255,0.02); border-bottom:1px solid #333; font-weight:bold;">الدردشة 💬</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-in" placeholder="اكتب..." onkeypress="if(event.key==='Enter') sendChat()">
            <button onclick="sendChat()">ارسل</button>
        </div>
    </div>
</div>

<div id="leaderboard-overlay" class="hidden">
    <div class="game-box" style="width:300px; text-align:center;">
        <h2 style="color:var(--accent)">النتائج النهائية 🏆</h2>
        <div id="final-list" style="margin:20px 0;"></div>
        <button onclick="location.reload()">لعبة جديدة</button>
    </div>
</div>

<script>
    let myId = localStorage.getItem('game_user_id') || ('u_' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('game_user_id', myId);
    const socket = io();
    let currentDrawerId = null, selected = [], currentGameState = "LOBBY";

    function join() {
        const n = document.getElementById('nick').value; if(!n) return;
        localStorage.setItem('game_user_name', n);
        socket.emit('joinGame', { userId: myId, name: n });
        document.getElementById('name-screen').classList.add('hidden');
        document.getElementById('player-bar').classList.remove('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
        document.getElementById('chat-box').classList.remove('hidden');
    }

    window.onload = () => { if(localStorage.getItem('game_user_name')) { document.getElementById('nick').value = localStorage.getItem('game_user_name'); join(); } };
    function startGame() { socket.emit('requestStart', { rounds: document.getElementById('rounds-count').value }); }
    function sendChat() { const i = document.getElementById('chat-in'); if(i.value) { socket.emit('sendChat', i.value); i.value = ""; } }

    socket.on('newChat', d => {
        const c = document.getElementById('chat-messages');
        const m = document.createElement('div'); m.className = 'msg'; m.style.borderRightColor = d.color;
        m.innerHTML = `<b style="color:${d.color}">${d.sender}</b>${d.text}`;
        c.appendChild(m); c.scrollTop = c.scrollHeight;
    });

    socket.on('updatePlayerList', d => {
        const bar = document.getElementById('player-bar'); bar.innerHTML = "";
        if(myId === d.hostId && d.gameState === "LOBBY") document.getElementById('host-controls').classList.remove('hidden');
        d.players.forEach(id => {
            const tag = document.createElement('div'); tag.className = 'p-tag';
            tag.innerHTML = `<span>${d.playerNames[id]}${id === d.hostId ? " 👑" : ""}</span><span class="p-score">${d.scores[id]||0}</span>`;
            bar.appendChild(tag);
        });
    });

    socket.on('timerUpdate', t => document.getElementById('timer').innerText = t);

    socket.on('roundStarted', d => {
        currentDrawerId = d.drawerId; selected = [];
        document.getElementById('vote-details-container').innerHTML = "";
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('clue-display').innerText = (myId === d.drawerId) ? "اختر كلمتين واكتب الرابط" : `بانتظار ${d.drawerName}...`;
        document.getElementById('draw-ctrl').className = (myId === d.drawerId) ? "" : "hidden";
        render(d.words, (myId !== d.drawerId));
    });

    socket.on('showClue', d => {
        selected = [];
        document.getElementById('clue-display').innerHTML = `<small style="font-size:0.5em; color:#888;">المشفر: ${d.drawerName}</small><br>الرابط: ${d.clue}`;
        if(myId !== currentDrawerId) {
            document.getElementById('fake-ctrl').classList.remove('hidden');
            render(d.pWords, false);
        }
    });

    socket.on('startVoting', d => {
        selected = []; document.getElementById('fake-ctrl').classList.add('hidden');
        document.getElementById('clue-display').innerText = (myId === d.drawerId) ? "اللاعبون يصوتون..." : "صوّت للزوج الصحيح!";
        if(myId !== d.drawerId) document.getElementById('vote-ctrl').classList.remove('hidden');
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        d.options.forEach(pair => {
            const card = document.createElement('div'); card.className = 'card'; card.innerText = pair.join(" + ");
            card.onclick = () => { if(myId === d.drawerId) return; document.querySelectorAll('.card').forEach(c => c.classList.remove('selected')); card.classList.add('selected'); selected = pair; };
            grid.appendChild(card);
        });
    });

    socket.on('roundFinished', d => {
        document.getElementById('vote-ctrl').classList.add('hidden');
        document.querySelectorAll('.card').forEach(c => { if(c.innerText === d.correctWords.join(" + ")) c.classList.add('correct-answer'); });
        let html = ''; for (let choice in d.voteDetails) html += `<div class="vote-info"><b>[${choice}]</b>: ${d.voteDetails[choice].join(", ")}</div>`;
        document.getElementById('vote-details-container').innerHTML = html;
    });

    socket.on('gameOver', d => {
        document.getElementById('leaderboard-overlay').classList.remove('hidden');
        const list = document.getElementById('final-list'); list.innerHTML = "";
        d.leaderboard.forEach((p, i) => list.innerHTML += `<div style="padding:8px; border-bottom:1px solid #333;">${i+1}. ${p.name}: ${p.score}</div>`);
    });

    function render(words, disabled) {
        const grid = document.getElementById('grid'); grid.innerHTML = "";
        words.forEach(w => {
            const card = document.createElement('div'); card.className = 'card'; card.innerText = w;
            if(!disabled) card.onclick = () => {
                if(card.classList.contains('selected')) { card.classList.remove('selected'); selected = selected.filter(s => s !== w); }
                else if(selected.length < 2) { card.classList.add('selected'); selected.push(w); }
            };
            grid.appendChild(card);
        });
    }

    function sendAction(type) {
        if(type === 'submitClue') {
            const clue = document.getElementById('clue-in').value;
            if(selected.length !== 2 || !clue) return alert("اختر كلمتين واكتب رابطاً!");
            socket.emit('submitClue', { words: selected, clue });
            document.getElementById('draw-ctrl').classList.add('hidden');
        } else if(type === 'submitFake') {
            if(selected.length !== 2) return alert("اختر كلمتين!");
            socket.emit('submitFake', selected);
            document.getElementById('fake-ctrl').classList.add('hidden');
        } else if(type === 'submitVote') {
            if(selected.length !== 2) return alert("اختر زوجاً!");
            socket.emit('submitVote', selected);
            document.getElementById('vote-ctrl').classList.add('hidden');
        }
    }
</script>
</body>
</html>
