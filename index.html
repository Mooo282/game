<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الرابط العجيب</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; text-align: center; padding: 10px; margin: 0; }
        .box { background: #111; max-width: 800px; margin: 20px auto; padding: 25px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #player-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; padding: 15px; background: rgba(26,26,26,0.9); border-radius: 15px; border: 1px solid #444; }
        .p-tag { background: #222; padding: 6px 12px; border-radius: 12px; border: 1px solid #444; display: flex; align-items: center; gap: 10px; }
        .p-score { background: #2563eb; color: white; padding: 2px 8px; border-radius: 8px; font-size: 0.85em; font-weight: 900; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .card { padding: 18px; border: 2px solid #333; border-radius: 12px; cursor: pointer; background: #1a1a1a; color: #fff; font-weight: bold; min-height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .selected { background: #ca8a04; border-color: #facc15; }
        .correct-answer { background: #16a34a !important; border-color: #22c55e !important; }
        .hidden { display: none !important; }
        #timer { font-size: 3em; color: #ff4d4d; font-weight: 900; }
        #clue-display { font-size: 2.2em; color: #fb923c; margin: 15px 0; min-height: 1.2em; font-weight: bold; }
        button { background: #2563eb; color: white; border: none; padding: 12px 28px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #leaderboard-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        #status-msg { margin-top: 15px; color: #aaa; font-style: italic; min-height: 1.5em; }
        .vote-info { background: #222; padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 0.85em; border-right: 4px solid #2563eb; text-align: right; }
        input[type="text"] { padding:12px; background:#222; color:#fff; border:1px solid #444; border-radius:8px; width: 200px; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <div id="player-bar" class="hidden"></div>
    <div id="name-screen">
        <h1>الرابط العجيب</h1>
        <input type="text" id="nick" placeholder="اكتب اسمك...">
        <br><br><button onclick="join()">دخول</button>
    </div>

    <div id="lobby-screen" class="hidden">
        <div id="host-controls" class="hidden">
            <select id="rounds-count" style="background:#222; color:#fff; padding:8px;"><option value="5">5 جولات</option><option value="10">10 جولات</option></select>
            <br><br><button onclick="startGame()">ابدأ الجولة 🚀</button>
        </div>
        <p id="wait-msg">بانتظار المضيف لبدء اللعبة...</p>
    </div>

    <div id="game-screen" class="hidden">
        <div id="timer">60</div>
        <div id="clue-display"></div>
        <div class="grid" id="grid"></div>
        <div id="controls">
            <div id="draw-ctrl" class="hidden"><input type="text" id="clue-in" placeholder="اكتب الرابط السري..."><br><br><button onclick="sendAction('submitClue')">إرسال الرابط</button></div>
            <div id="fake-ctrl" class="hidden"><button onclick="sendAction('submitFake')" style="background:#9333ea;">تضليل (2)</button></div>
            <div id="vote-ctrl" class="hidden"><button onclick="sendAction('submitVote')" style="background:#16a34a;">تصويت نهائي (2)</button></div>
        </div>
        <div id="status-msg"></div>
        <div id="vote-details-container"></div>
    </div>
</div>

<div id="leaderboard-overlay" class="hidden">
    <div style="background:#111; padding:30px; border-radius:20px; border:2px solid #2563eb; width:280px;">
        <h2>النتائج النهائية 🏆</h2>
        <div id="final-list" style="margin:25px 0;"></div>
        <button onclick="location.reload()">لعبة جديدة</button>
    </div>
</div>

<script>
    let myId = localStorage.getItem('game_user_id') || ('u_' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('game_user_id', myId);
    const socket = io();
    let currentDrawerId = null, selected = [], currentGameState = "LOBBY";

    function join() {
        const n = document.getElementById('nick').value; if(!n) return;
        localStorage.setItem('game_user_name', n);
        socket.emit('joinGame', { userId: myId, name: n });
        document.getElementById('name-screen').classList.add('hidden');
        document.getElementById('player-bar').classList.remove('hidden');
        document.getElementById('lobby-screen').classList.remove('hidden');
    }

    window.onload = () => { if(localStorage.getItem('game_user_name')) { document.getElementById('nick').value = localStorage.getItem('game_user_name'); join(); } };

    function startGame() { socket.emit('requestStart', { rounds: document.getElementById('rounds-count').value }); }

    socket.on('updatePlayerList', d => {
        currentGameState = d.gameState;
        const bar = document.getElementById('player-bar'); bar.innerHTML = "";
        const hostCtrl = document.getElementById('host-controls');
        const waitMsg = document.getElementById('wait-msg');

        if(myId === d.hostId && currentGameState === "LOBBY") {
            hostCtrl.classList.remove('hidden');
            waitMsg.classList.add('hidden');
        } else {
            hostCtrl.classList.add('hidden');
            if(currentGameState === "LOBBY") waitMsg.classList.remove('hidden');
        }

        d.players.forEach(id => {
            const tag = document.createElement('div'); tag.className = 'p-tag';
            tag.innerHTML = `<span>${d.playerNames[id]}${id === d.hostId ? " 👑" : ""}</span><span class="p-score">${d.scores[id]||0}</span>`;
            bar.appendChild(tag);
        });
    });

    socket.on('timerUpdate', t => document.getElementById('timer').innerText = t);

    socket.on('roundStarted', d => {
        currentDrawerId = d.drawerId;
        currentGameState = "DRAWING";
        document.getElementById('status-msg').innerText = "";
        document.getElementById('vote-details-container').innerHTML = "";
        document.getElementById('lobby-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        
        if (myId === d.drawerId) {
            document.getElementById('clue-display').innerText = "أنت المختار! اختر كلمتين واكتب الرابط";
            document.getElementById('draw-ctrl').classList.remove('hidden');
        } else {
            document.getElementById('clue-display').innerText = `بانتظار ${d.drawerName} ليكتب الرابط...`;
            document.getElementById('draw-ctrl').classList.add('hidden');
        }
        render(d.words, (myId !== d.drawerId));
    });

    socket.on('showClue', d => {
        currentGameState = "FAKING";
        document.getElementById('status-msg').innerText = "";
        document.getElementById('clue-display').innerHTML = `<small style="font-size:0.4em; display:block; color:#aaa;">المشفر: ${d.drawerName}</small>الرابط: ${d.clue}`;
        if(myId !== currentDrawerId) {
            document.getElementById('fake-ctrl').classList.remove('hidden');
            render(d.pWords, false);
        }
    });

    socket.on('startVoting', d => {
        currentGameState = "VOTING";
        document.getElementById('status-msg').innerText = "";
        document.getElementById('fake-ctrl').classList.add('hidden');
        
        if(myId === d.drawerId) {
            document.getElementById('clue-display').innerText = "اللاعبون يصوتون الآن على كلماتك...";
            render(d.options, true);
        } else {
            document.getElementById('clue-display').innerText = "صوّت للرابط الصحيح!";
            document.getElementById('vote-ctrl').classList.remove('hidden');
            render(d.options, false);
        }
    });

    socket.on('roundFinished', d => {
        document.getElementById('status-msg').innerHTML = "<b>انتهت الجولة!</b>";
        document.querySelectorAll('.card').forEach(c => { if(d.correctWords.includes(c.innerText)) c.classList.add('correct-answer'); });
        
        const detailsContainer = document.getElementById('vote-details-container');
        let html = '<div style="margin-top:20px; text-align:right;">';
        for (let choice in d.voteDetails) {
            html += `<div class="vote-info">الخيار [<b>${choice}</b>]: صوّت له (${d.voteDetails[choice].join(", ")})</div>`;
        }
        html += '</div>';
        detailsContainer.innerHTML = html;
    });

    socket.on('gameOver', d => {
        currentGameState = "LOBBY";
        document.getElementById('leaderboard-overlay').classList.remove('hidden');
        document.getElementById('final-list').innerHTML = d.leaderboard.map(p => `<div>${p.name}: ${p.score}</div>`).join('');
    });

    function render(words, disable) {
        const g = document.getElementById('grid'); g.innerHTML = ""; selected = [];
        words.forEach(w => {
            const d = document.createElement('div'); d.className = 'card'; d.innerText = w;
            d.onclick = () => { if(!disable) { d.classList.toggle('selected'); selected = [...document.querySelectorAll('.card.selected')].map(e => e.innerText); if(selected.length > 2) { d.classList.remove('selected'); selected.pop(); } } };
            g.appendChild(d);
        });
    }

    function sendAction(ev) {
        if(selected.length !== 2) return alert("يجب اختيار كلمتين بالضبط!");
        if (ev === 'submitClue' && !document.getElementById('clue-in').value.trim()) return alert("اكتب الرابط أولاً!");

        socket.emit(ev, ev === 'submitClue' ? { clue: document.getElementById('clue-in').value, words: selected } : selected);
        
        document.getElementById('draw-ctrl').classList.add('hidden');
        document.getElementById('fake-ctrl').classList.add('hidden');
        document.getElementById('vote-ctrl').classList.add('hidden');

        const msg = document.getElementById('status-msg');
        if (ev === 'submitClue') msg.innerText = "تم إرسال الرابط.. بانتظار تضليل اللاعبين! 🤔";
        else if (ev === 'submitFake') msg.innerText = "تم إرسال تضليلك.. بانتظار البقية! 😈";
        else if (ev === 'submitVote') msg.innerText = "تم تسجيل تصويتك.. لنرى من الفائز! ⚖️";
    }
</script>
</body>
</html>
